<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storybound — Famous Fate Beta Reports</title>
<style>
  body { font-family: 'Lora', Georgia, serif; background: #0e0c08; color: #e8d8b8; margin: 0; padding: 24px; min-height: 100vh; }
  h1 { font-family: 'Cinzel', 'Lora', serif; color: #ffd700; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 12px; margin-bottom: 18px; }
  h1 .bug { font-size: 0.8em; }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .topbar input, .topbar select, .topbar button {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.4); color: #e8d8b8;
    padding: 6px 10px; border-radius: 4px; font-family: 'Lora', serif; font-size: 13px;
  }
  .topbar button { background: rgba(255,215,0,0.18); border-color: rgba(255,215,0,0.55); color: #ffd700; cursor: pointer; }
  .topbar button:hover { background: rgba(255,215,0,0.32); }
  .topbar input.search { min-width: 220px; }
  .report-card { background: rgba(0,0,0,0.42); border: 1px solid rgba(255,215,0,0.22); border-radius: 6px; padding: 14px 16px; margin-bottom: 14px; }
  .report-card.high { border-left: 4px solid #e96a6a; }
  .report-card.status-confirmed { border-left: 4px solid #6ab38f; }
  .report-card.status-working_as_intended, .report-card.status-not_reproducible, .report-card.status-duplicate { opacity: 0.6; }
  .report-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; opacity: 0.78; margin-bottom: 10px; }
  .report-meta span { white-space: nowrap; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .pill.cat { background: rgba(120,150,220,0.2); color: #aabfe8; }
  .pill.hp { background: rgba(233,106,106,0.25); color: #e96a6a; }
  .pill.reward { background: rgba(255,215,0,0.2); color: #ffd700; }
  .pill.granted { background: rgba(106,179,143,0.25); color: #6ab38f; }
  .headline { font-size: 14px; line-height: 1.4; margin-bottom: 6px; }
  .headline strong { color: #ffd700; }
  .report-description { font-size: 14px; line-height: 1.5; white-space: pre-wrap; margin-bottom: 6px; }
  .report-expected { font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; margin-bottom: 10px; color: #c8b890; }
  details { font-size: 12px; margin-bottom: 8px; }
  details summary { cursor: pointer; color: #c8b890; margin-bottom: 4px; }
  pre { background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 4px; overflow-x: auto; font-size: 11px; line-height: 1.4; color: #c8b890; max-height: 360px; }
  .shot { max-width: 180px; max-height: 120px; border: 1px solid rgba(255,215,0,0.3); border-radius: 4px; cursor: zoom-in; vertical-align: top; }
  .actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .actions select, .actions input[type="text"] {
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.3); color: #e8d8b8;
    padding: 6px 10px; border-radius: 4px; font-family: 'Lora', serif; font-size: 12px;
  }
  .actions input[type="text"] { flex: 1; min-width: 160px; }
  .btn-save { background: rgba(106,179,143,0.25); border: 1px solid #6ab38f; color: #6ab38f; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
  .btn-save:hover { background: rgba(106,179,143,0.4); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .empty { opacity: 0.55; text-align: center; padding: 40px 0; font-style: italic; }
  a.link { color: #aabfe8; }
</style>
</head>
<body>
<h1><span class="bug">🐞</span> Famous Fate Beta Reports</h1>

<div class="topbar">
  <label>Admin key: <input id="adminKey" type="password" placeholder="paste ADMIN_BUG_KEY"></label>
  <label>Filter:
    <select id="filter">
      <option value="pending" selected>Pending</option>
      <option value="confirmed">Confirmed</option>
      <option value="high_priority">High priority</option>
      <option value="all">All</option>
    </select>
  </label>
  <input class="search" id="search" type="text" placeholder="Filter loaded rows: franchise / character / world / category…">
  <button id="refresh">Refresh</button>
  <span id="status" style="opacity:0.7; font-size:12px;"></span>
</div>

<div id="reports"></div>

<script>
const $ = id => document.getElementById(id);
const reportsEl = $('reports');
let _rows = [];

const STATUSES = ['pending','confirmed','duplicate','not_reproducible','working_as_intended','needs_discussion'];
const REWARDS = [0,1,3,5,10,25];
const CAT_LABELS = {
  technical_bug:'Technical bug', canon_lore:'Canon / lore', out_of_character:'Out of character',
  romance_relationship:'Romance', story_continuity:'Continuity', writing_quality:'Writing quality',
  suggestion:'Suggestion', other:'Other'
};

$('adminKey').value = sessionStorage.getItem('sb_admin_key') || '';
$('adminKey').addEventListener('change', () => sessionStorage.setItem('sb_admin_key', $('adminKey').value));

function esc(s){ if (typeof s !== 'string') return ''; return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(iso){ if (!iso) return '—'; return new Date(iso).toLocaleString(); }

function renderCard(r){
  const opts = STATUSES.map(s => `<option value="${s}" ${r.status===s?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('');
  const rewardOpts = REWARDS.map(n => `<option value="${n}" ${r.reward_fortunes===n?'selected':''}>${n===0?'no reward':('+'+n+'F')}</option>`).join('');
  const tele = r.telemetry || {};
  return `
  <div class="report-card status-${r.status} ${r.high_priority?'high':''}" data-id="${r.id}">
    <div class="report-meta">
      <span><strong>#${r.id.slice(0,8)}</strong></span>
      <span class="pill cat">${esc(CAT_LABELS[r.category]||r.category||'—')}</span>
      <span>Status: <strong>${esc((r.status||'').replace(/_/g,' '))}</strong></span>
      ${r.high_priority?'<span class="pill hp">images generated!</span>':''}
      ${r.reward_granted?`<span class="pill granted">granted +${r.reward_fortunes}F</span>`:(r.reward_fortunes?`<span class="pill reward">+${r.reward_fortunes}F pending</span>`:'')}
      <span>${fmt(r.created_at)}</span>
    </div>
    <div class="headline">
      <strong>${esc(r.franchise||'—')}</strong> · as <strong>${esc(r.embodied_character||'—')}</strong>
      ${r.resolved_world?(' · '+esc(r.resolved_world)):''}
      ${r.scene_number!=null?(' · Scene '+(r.scene_number+1)):''}
    </div>
    <div class="report-meta">
      <span>Reporter: ${esc(r.user_email||r.user_id||'—')}</span>
      ${r.story_id?`<span>Story: ${esc(String(r.story_id).slice(0,16))}</span>`:''}
      ${r.scene_id?`<span>SceneId: ${esc(r.scene_id)}</span>`:''}
      ${r.classifier_version?`<span>Classifier: ${esc(r.classifier_version)}</span>`:''}
      ${r.author_model?`<span>Author: ${esc(r.author_model)}</span>`:''}
      ${r.build_version?`<span>Build: ${esc(r.build_version)}</span>`:''}
    </div>
    <div class="report-description">${esc(r.description||'')}</div>
    ${r.expected?`<div class="report-expected"><em>Expected:</em> ${esc(r.expected)}</div>`:''}
    ${r.screenshot_url?`<a href="${esc(r.screenshot_url)}" target="_blank" rel="noopener"><img class="shot" src="${esc(r.screenshot_url)}" alt="screenshot"></a>`:''}
    ${tele.reading?`<details><summary>Reading position</summary><pre>${esc(JSON.stringify(tele.reading,null,2))}</pre></details>`:''}
    <details><summary>Full telemetry payload</summary><pre>${esc(JSON.stringify(tele,null,2))}</pre></details>
    ${r.reviewer_notes?`<details open><summary>Reviewer notes</summary><pre>${esc(r.reviewer_notes)}</pre></details>`:''}
    <div class="actions">
      <select id="status-${r.id}">${opts}</select>
      <select id="reward-${r.id}">${rewardOpts}</select>
      <input type="text" id="notes-${r.id}" placeholder="Reviewer notes (optional)" value="${esc(r.reviewer_notes||'')}">
      <button class="btn-save" onclick="saveReport('${r.id}')">Save</button>
    </div>
  </div>`;
}

function applySearch(){
  const q = ($('search').value||'').trim().toLowerCase();
  const rows = !q ? _rows : _rows.filter(r => JSON.stringify({
    f:r.franchise, e:r.embodied_character, w:r.resolved_world, c:r.category, s:r.scene_number,
    m:r.author_model, cv:r.classifier_version, st:r.status, em:r.user_email
  }).toLowerCase().includes(q));
  reportsEl.innerHTML = rows.length ? rows.map(renderCard).join('') : '<div class="empty">No matching reports.</div>';
  $('status').textContent = rows.length + ' / ' + _rows.length + ' report' + (_rows.length===1?'':'s');
}

async function load(){
  const key = $('adminKey').value.trim();
  if (!key){ $('status').textContent='Enter admin key.'; return; }
  $('status').textContent='Loading…';
  const url = '/api/famous-fate-report?adminKey='+encodeURIComponent(key)+'&filter='+encodeURIComponent($('filter').value);
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (resp.status===403){ $('status').textContent='Forbidden — wrong key.'; return; }
    if (!resp.ok){ $('status').textContent='Error: '+(data.error||resp.status); return; }
    _rows = data.reports || [];
    applySearch();
  } catch(e){ $('status').textContent='Network error: '+e.message; }
}

async function saveReport(id){
  const key = $('adminKey').value.trim();
  const status = $('status-'+id).value;
  const reward = parseInt($('reward-'+id).value, 10);
  const notes = $('notes-'+id).value || null;
  if (reward > 0 && !confirm('Set status "'+status+'" and CREDIT +'+reward+'F to the reporter? (one-time)')) return;
  const resp = await fetch('/api/famous-fate-report', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ adminKey:key, reportId:id, status, reward, notes })
  });
  const data = await resp.json();
  if (resp.ok){
    alert('Saved: '+data.source+(data.fortunes!=null?(' (user now '+data.fortunes+'F)'):''));
    load();
  } else alert('Failed: '+(data.error||resp.status));
}
window.saveReport = saveReport;

$('refresh').addEventListener('click', load);
$('filter').addEventListener('change', load);
$('search').addEventListener('input', applySearch);
$('adminKey').addEventListener('keydown', e => { if (e.key==='Enter') load(); });
if ($('adminKey').value) load();
</script>
</body>
</html>
